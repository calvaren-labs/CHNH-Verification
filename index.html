<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Council CHNH Verification</title>
<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --muted: #777;
  --border: #e5e5e5;
  --accent: #000;
}
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}
header {
  padding: 28px 40px;
  border-bottom: 1px solid var(--border);
}
h1 {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}
.container {
  padding: 40px;
  max-width: 1000px;
}
.section {
  margin-bottom: 50px;
}
label {
  font-size: 14px;
  font-weight: 500;
  display: block;
  margin-bottom: 8px;
}
select {
  padding: 8px;
  font-size: 14px;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
th {
  text-align: left;
  font-weight: 500;
}
.toggle {
  text-align: center;
}
input[type="checkbox"] {
  width: 16px;
  height: 16px;
}
button {
  margin-top: 30px;
  padding: 10px 18px;
  border: 1px solid var(--accent);
  background: #fff;
  cursor: pointer;
  font-size: 14px;
}
button:hover {
  background: #f7f7f7;
}
.note {
  font-size: 12px;
  color: var(--muted);
  margin-top: 12px;
}
#status {
  margin-top: 12px;
  font-size: 13px;
  color: var(--muted);
}
</style>
</head>
<body>
<header>
  <h1>Council CHNH Verification</h1>
</header>
<div class="container">
  <div class="section">
    <label>Select Member</label>
    <select id="memberSelect"></select>
  </div>
  <div class="section">
    <table id="capTable">
      <thead>
        <tr>
          <th>Capability</th>
          <th class="toggle">Can Help</th>
          <th class="toggle">Need Help</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button onclick="saveData()">Save</button>
    <div id="status"></div>
    <div class="note">Saves directly to the Council shared sheet.</div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzsRDbASOsaAxMAXRwAavIdEFbEf-zc2noYBHVkHD80PdgjPZlLwDQ81w9-CYzmgcTl_Q/exec";

const members = [
  "Aisleigh Mc Gann",
  "Amanda Sharpe",
  "Angelina Colombo",
  "Brett Durand",
  "Chanrandeep Kaur",
  "Dan Coll",
  "Derek Mogck",
  "Drew Ward",
  "Emily Teuben",
  "Eric Paul",
  "Jessica Vander Ploeg",
  "Karissa Boley",
  "LaTonya Ellis",
  "Lisa Kremer Brown",
  "Mary Gardner Burrelle",
  "Mareen Glennon",
  "Rozenn Heathcote",
  "Shailesh Mathankar",
  "Walt Cain"
];

let capabilities = [];

const memberSelect = document.getElementById("memberSelect");
const tableBody = document.querySelector("#capTable tbody");
const status = document.getElementById("status");

members.forEach(member => {
  const option = document.createElement("option");
  option.value = member;
  option.textContent = member;
  memberSelect.appendChild(option);
});

async function loadCapabilities() {
  status.textContent = "Loading capabilities...";
  try {
    const res = await fetch(`${API_URL}?action=capabilities`);
    capabilities = await res.json();
    renderTable();
    status.textContent = "";
  } catch (err) {
    status.textContent = "Error loading capabilities. Please refresh.";
    console.error(err);
  }
}

function renderTable() {
  tableBody.innerHTML = "";
  capabilities.forEach(cap => {
    const row = document.createElement("tr");

    const capCell = document.createElement("td");
    capCell.textContent = cap;

    const canCell = document.createElement("td");
    canCell.className = "toggle";
    const canBox = document.createElement("input");
    canBox.type = "checkbox";

    const needCell = document.createElement("td");
    needCell.className = "toggle";
    const needBox = document.createElement("input");
    needBox.type = "checkbox";

    canCell.appendChild(canBox);
    needCell.appendChild(needBox);
    row.appendChild(capCell);
    row.appendChild(canCell);
    row.appendChild(needCell);
    tableBody.appendChild(row);
  });
}

async function saveData() {
  const member = memberSelect.value;
  const rows = document.querySelectorAll("#capTable tbody tr");
  const payload = {};

  rows.forEach(row => {
    const capability = row.children[0].textContent;
    payload[capability + " - Can"]  = row.children[1].querySelector("input").checked ? 1 : 0;
    payload[capability + " - Need"] = row.children[2].querySelector("input").checked ? 1 : 0;
  });

  status.textContent = "Saving...";

  try {
    const url = `${API_URL}?action=save&member=${encodeURIComponent(member)}&data=${encodeURIComponent(JSON.stringify(payload))}`;
    const res = await fetch(url);
    const result = await res.json();
    if (result.status === "success") {
      status.textContent = `✓ Saved for ${result.member}`;
    } else {
      status.textContent = `Error: ${result.message}`;
    }
  } catch (err) {
    status.textContent = "Save failed. Please try again.";
    console.error(err);
  }
}

loadCapabilities();
</script>
</body>
</html>
