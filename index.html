<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Council CHNH Verification</title>
<style>
:root {
  --bg: #ffffff;
  --text: #111;
  --muted: #777;
  --border: #e5e5e5;
  --accent: #000;
}
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
}
header {
  padding: 28px 40px;
  border-bottom: 1px solid var(--border);
}
h1 {
  font-size: 20px;
  font-weight: 600;
  margin: 0;
}
.container {
  padding: 40px;
  max-width: 1000px;
}
.section {
  margin-bottom: 50px;
}
label {
  font-size: 14px;
  font-weight: 500;
  display: block;
  margin-bottom: 8px;
}
select {
  padding: 8px;
  font-size: 14px;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
}
th, td {
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
th {
  text-align: left;
  font-weight: 500;
}
.toggle {
  text-align: center;
}
input[type="checkbox"] {
  width: 16px;
  height: 16px;
}
button {
  margin-top: 30px;
  padding: 10px 18px;
  border: 1px solid var(--accent);
  background: #fff;
  cursor: pointer;
  font-size: 14px;
}
button:hover {
  background: #f7f7f7;
}
.note {
  font-size: 12px;
  color: var(--muted);
  margin-top: 12px;
}
.admin-toggle {
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  margin: 0;
  text-decoration: underline;
}
.admin-toggle:hover {
  color: var(--text);
  background: none;
  border: none;
}
.admin-section {
  display: none;
  margin-top: 50px;
  padding-top: 30px;
  border-top: 1px solid var(--border);
}
.admin-section.visible {
  display: block;
}
.admin-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 20px;
}
.add-member-row {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
}
.add-member-row input {
  padding: 8px;
  font-size: 14px;
  border: 1px solid var(--border);
  flex: 1;
  max-width: 300px;
}
.member-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
.member-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  max-width: 400px;
}
.remove-btn {
  margin: 0;
  padding: 4px 10px;
  font-size: 12px;
  color: #c00;
  border-color: #c00;
}
.remove-btn:hover {
  background: #fff0f0;
}
.admin-status {
  font-size: 12px;
  color: var(--muted);
  margin-top: 10px;
}
</style>
</head>
<body>
<header>
  <h1>Council CHNH Verification</h1>
</header>
<div class="container">
  <div class="section">
    <label>Select Member</label>
    <select id="memberSelect"></select>
  </div>
  <div class="section">
    <table id="capTable">
      <thead>
        <tr>
          <th>Capability</th>
          <th class="toggle">Can Help</th>
          <th class="toggle">Need Help</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <button onclick="saveData()">Save</button>
    <div id="status"></div>
    <div class="note">Saves directly to the Council shared sheet.</div>
  </div>

  <div class="section">
    <button class="admin-toggle" onclick="toggleAdmin()">⚙ Manage Members</button>
    <div class="admin-section" id="adminSection">
      <div class="admin-title">Add / Remove Members</div>
      <div class="add-member-row">
        <input type="text" id="newMemberInput" placeholder="Full name" />
        <button onclick="addMember()">Add Member</button>
      </div>
      <ul class="member-list" id="memberList"></ul>
      <div class="admin-status" id="adminStatus"></div>
    </div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzyxeDKi1b6vDTTi07iD25sEaMZewEy05XSs7enu1XnDUSh4qzoO0C7CDzHz2GJsDqWkg/exec";

let capabilities = [];
let members = [];

const memberSelect = document.getElementById("memberSelect");
const tableBody = document.querySelector("#capTable tbody");
const status = document.getElementById("status");

async function loadData() {
  status.textContent = "Loading...";
  try {
    const [capRes, memRes] = await Promise.all([
      fetch(`${API_URL}?action=capabilities`),
      fetch(`${API_URL}?action=members`)
    ]);
    capabilities = await capRes.json();
    members = await memRes.json();

    members.forEach(member => {
      const option = document.createElement("option");
      option.value = member;
      option.textContent = member;
      memberSelect.appendChild(option);
    });

    renderTable();
    renderMemberList();
    status.textContent = "";
  } catch (err) {
    status.textContent = "Error loading data. Please refresh.";
    console.error(err);
  }
}

function renderTable() {
  tableBody.innerHTML = "";
  capabilities.forEach(cap => {
    const row = document.createElement("tr");

    const capCell = document.createElement("td");
    capCell.textContent = cap;

    const canCell = document.createElement("td");
    canCell.className = "toggle";
    const canBox = document.createElement("input");
    canBox.type = "checkbox";

    const needCell = document.createElement("td");
    needCell.className = "toggle";
    const needBox = document.createElement("input");
    needBox.type = "checkbox";

    canCell.appendChild(canBox);
    needCell.appendChild(needBox);
    row.appendChild(capCell);
    row.appendChild(canCell);
    row.appendChild(needCell);
    tableBody.appendChild(row);
  });
}

async function saveData() {
  const member = memberSelect.value;
  const rows = document.querySelectorAll("#capTable tbody tr");
  const payload = {};

  rows.forEach(row => {
    const capability = row.children[0].textContent;
    payload[capability + " - Can"]  = row.children[1].querySelector("input").checked ? 1 : 0;
    payload[capability + " - Need"] = row.children[2].querySelector("input").checked ? 1 : 0;
  });

  status.textContent = "Saving...";

  try {
    const url = `${API_URL}?action=save&member=${encodeURIComponent(member)}&data=${encodeURIComponent(JSON.stringify(payload))}`;
    const res = await fetch(url);
    const result = await res.json();
    if (result.status === "success") {
      status.textContent = `✓ Saved for ${result.member}`;
    } else {
      status.textContent = `Error: ${result.message}`;
    }
  } catch (err) {
    status.textContent = "Save failed. Please try again.";
    console.error(err);
  }
}

function toggleAdmin() {
  const section = document.getElementById("adminSection");
  if (section.classList.contains("visible")) {
    section.classList.remove("visible");
    return;
  }
  const pwd = prompt("Enter admin password:");
  if (pwd === "Archive@2026") {
    section.classList.add("visible");
  } else {
    alert("Incorrect password.");
  }
}

function renderMemberList() {
  const list = document.getElementById("memberList");
  list.innerHTML = "";
  members.forEach(member => {
    const li = document.createElement("li");
    li.textContent = member;
    const btn = document.createElement("button");
    btn.textContent = "Remove";
    btn.className = "remove-btn";
    btn.onclick = () => removeMember(member);
    li.appendChild(btn);
    list.appendChild(li);
  });
}

async function addMember() {
  const input = document.getElementById("newMemberInput");
  const name = input.value.trim();
  const adminStatus = document.getElementById("adminStatus");
  if (!name) return;

  adminStatus.textContent = "Adding...";
  try {
    const res = await fetch(`${API_URL}?action=addMember&member=${encodeURIComponent(name)}`);
    const result = await res.json();
    if (result.status === "success") {
      members.push(name);
      members.sort();
      input.value = "";
      refreshMemberDropdown();
      renderMemberList();
      adminStatus.textContent = `✓ Added ${name}`;
    } else {
      adminStatus.textContent = `Error: ${result.message}`;
    }
  } catch (err) {
    adminStatus.textContent = "Failed to add member.";
    console.error(err);
  }
}

async function removeMember(name) {
  const adminStatus = document.getElementById("adminStatus");
  if (!confirm(`⚠️ Warning: This will permanently delete ${name} and all their data from the sheet.\n\nAre you sure you want to continue?`)) return;

  adminStatus.textContent = "Removing...";
  try {
    const res = await fetch(`${API_URL}?action=removeMember&member=${encodeURIComponent(name)}`);
    const result = await res.json();
    if (result.status === "success") {
      members = members.filter(m => m !== name);
      refreshMemberDropdown();
      renderMemberList();
      adminStatus.textContent = `✓ Removed ${name}`;
    } else {
      adminStatus.textContent = `Error: ${result.message}`;
    }
  } catch (err) {
    adminStatus.textContent = "Failed to remove member.";
    console.error(err);
  }
}

function refreshMemberDropdown() {
  memberSelect.innerHTML = "";
  members.forEach(member => {
    const option = document.createElement("option");
    option.value = member;
    option.textContent = member;
    memberSelect.appendChild(option);
  });
}

loadData();
</script>
</body>
</html>
